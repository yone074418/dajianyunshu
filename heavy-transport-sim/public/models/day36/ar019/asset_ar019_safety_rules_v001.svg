<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 180" width="300" height="180">
  <rect x="10" y="10" width="280" height="160" rx="8" fill="#fff3cd" stroke="#ffc107" stroke-width="2"/>
  <text x="150" y="35" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#856404">安全规则提示</text>
  <line x1="20" y1="45" x2="280" y2="45" stroke="#ffc107" stroke-width="1"/>
  <text x="30" y="65" font-family="sans-serif" font-size="11" fill="#333">1. 确认货物重心位置</text>
  <text x="30" y="85" font-family="sans-serif" font-size="11" fill="#333">2. 检查绑扎工具完好</text>
  <text x="30" y="105" font-family="sans-serif" font-size="11" fill="#333">3. 测量路线障碍参数</text>
  <text x="30" y="125" font-family="sans-serif" font-size="11" fill="#333">4. 核对车辆承载能力</text>
